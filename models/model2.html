<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{COMPANY_NAME}} — Brochure</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #e8e8e8;
        padding: 30px;
    }

    .flyer {
        max-width: 420px;
        margin: 0 auto;
        background: #1a1a1a;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    .accent-bar {
        height: 8px;
        background: linear-gradient(90deg, {{PRIMARY_COLOR}}, {{SECONDARY_COLOR}});
    }

    .header-block {
        padding: 40px 30px 25px;
        text-align: center;
        border-bottom: 1px solid #333;
    }

    .logo-box {
        width: 90px;
        height: 90px;
        background: #fff;
        border-radius: 14px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .logo-box img {
        max-width: 75%;
        max-height: 75%;
    }

    .header-block h1 {
        color: #ffffff;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }

    .header-block .tagline {
        color: {{PRIMARY_COLOR}};
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
    };

    .body-block {
        padding: 30px;
    }

    .body-block p {
        color: #cccccc;
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 20px;
        text-align: center;
    }

    .prepared {
        font-size: 12px;
        color: #888;
        font-style: italic;
        text-align: center;
        margin-bottom: 25px;
    }

    .contact-row {
        display: flex;
        gap: 12px;
    }

    .contact-card {
        flex: 1;
        background: #262626;
        border-radius: 10px;
        padding: 16px 12px;
        text-align: center;
        border-top: 3px solid {{PRIMARY_COLOR}};
    }

    .contact-card .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: {{SECONDARY_COLOR}};
        margin-bottom: 6px;
        font-weight: bold;
    }

    .contact-card .value {
        font-size: 12px;
        color: #fff;
        word-break: break-word;
    }

    .footer-strip {
        background: {{SECONDARY_COLOR}};
        text-align: center;
        padding: 12px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="flyer">

    <div class="accent-bar"></div>

    <div class="header-block">
        <div class="logo-box">
            <img src="{{LOGO_PATH}}" alt="{{COMPANY_NAME}} logo">
        </div>
        <h1>{{COMPANY_NAME}}</h1>
        <p class="tagline">{{TAGLINE}}</p>
    </div>

    <div class="body-block">
        <p>
            We deliver quality and value in everything we do — built on trust,
            professionalism, and real care for every client we serve.
        </p>
        <p class="prepared">Prepared by {{FULL_NAME}}</p>

        <div class="contact-row">
            <div class="contact-card">
                <div class="label">Email</div>
                <div class="value">{{EMAIL}}</div>
            </div>
            <div class="contact-card">
                <div class="label">Phone</div>
                <div class="value">{{PHONE}}</div>
            </div>
        </div>
    </div>

    <div class="footer-strip">{{COMPANY_NAME}}</div>

</div>

</body>
</html>
