<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{COMPANY_NAME}} — Brochure</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #e8e8e8;
        padding: 30px;
    }

    .flyer {
        max-width: 420px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        border: 6px solid {{PRIMARY_COLOR}};
    }

    .top-block {
        background: {{PRIMARY_COLOR}};
        padding: 45px 30px 60px;
        text-align: center;
        position: relative;
    }

    .logo-badge {
        width: 100px;
        height: 100px;
        background: #fff;
        border-radius: 50%;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        overflow: hidden;
    }

    .logo-badge img {
        max-width: 75%;
        max-height: 75%;
    }

    .top-block h1 {
        color: #fff;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    .top-block .tagline {
        color: rgba(255,255,255,0.9);
        font-size: 15px;
        font-style: italic;
    }

    .ribbon {
        background: {{SECONDARY_COLOR}};
        color: #fff;
        text-align: center;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 10px;
        margin-top: -25px;
        margin-left: 30px;
        margin-right: 30px;
        border-radius: 8px;
        position: relative;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .body-block {
        padding: 40px 30px 30px;
        text-align: center;
    }

    .body-block p {
        font-size: 14px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 25px;
    }

    .prepared {
        font-size: 12px;
        color: #999;
        font-style: italic;
        margin-bottom: 25px;
    }

    .contact-pill {
        background: #f5f5f5;
        border-radius: 12px;
        padding: 18px 20px;
        margin-bottom: 20px;
    }

    .contact-pill p {
        font-size: 14px;
        color: #333;
        margin: 6px 0;
        font-weight: 600;
    }

    .contact-pill span {
        color: {{PRIMARY_COLOR}};
    }

    .bottom-strip {
        background: {{PRIMARY_COLOR}};
        text-align: center;
        padding: 14px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="flyer">

    <div class="top-block">
        <div class="logo-badge">
            <img src="{{LOGO_PATH}}" alt="{{COMPANY_NAME}} logo">
        </div>
        <h1>{{COMPANY_NAME}}</h1>
        <p class="tagline">{{TAGLINE}}</p>
    </div>

    <div class="ribbon">Quality You Can Trust</div>

    <div class="body-block">
        <p>
            We deliver quality and value in everything we do — built on trust,
            professionalism, and real care for every client we serve.
        </p>
        <p class="prepared">Prepared by {{FULL_NAME}}</p>

        <div class="contact-pill">
            <p>📧 <span>{{EMAIL}}</span></p>
            <p>📞 <span>{{PHONE}}</span></p>
        </div>
    </div>

    <div class="bottom-strip">{{COMPANY_NAME}}</div>

</div>

</body>
</html>
